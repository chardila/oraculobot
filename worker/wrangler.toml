name = "oraculobot-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[vars]
# Non-secret vars go here. Secrets are set via `wrangler secret put`.
# Secrets: TELEGRAM_BOT_TOKEN, ADMIN_TELEGRAM_ID, SUPABASE_URL, SUPABASE_SERVICE_KEY,
#           SUPABASE_ANON_KEY, DEEPSEEK_API_KEY, GITHUB_PAT, GITHUB_REPO,
#           INVITE_CODE_SECRET, TELEGRAM_BOT_USERNAME, TELEGRAM_WEBHOOK_SECRET,
#           WORKER_ADMIN_SECRET
WEB_ORIGIN = "https://chardila.github.io"
WEB_REDIRECT_URL = "https://chardila.github.io/oraculobot/jugar.html"
